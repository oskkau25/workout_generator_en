name: Manual Full Test Suite

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-test-suite:
    name: Full Selenium Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ci-cd/requirements.txt

      - name: Run complete test suite
        run: python ci-cd/run_complete_test_suite.py --headless

      - name: Upload full suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-suite-results
          path: |
            complete_test_suite_results.json
            *_results.json
            reports/test_results/*.json
